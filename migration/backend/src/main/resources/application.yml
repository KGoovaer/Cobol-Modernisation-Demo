spring:
  application:
    name: MYFIN
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  servlet:
    session:
      timeout: 30m

logging:
  file:
    name: logs/MYFIN.log
  level:
    root: WARN
    be.betfin: INFO
